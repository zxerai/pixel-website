            <h3 class="project-title">易记工</h3>
            <p class="project-desc">
              一款更适合个人使用的记工小程序。记工更快、账单更清楚、工具更顺手。<br><br>
              主要功能：<br>
              • 日历视图 + 实时天气<br>
              • 工地记工管理，金额一目了然<br>
              • 实用工具：计算器、工费计算、备忘录
            </p>
            <div class="project-tags">
              <span class="project-tag">微信小程序</span>
              <span class="project-tag">记工工具</span>
              <span class="project-tag">效率工具</span>
