<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系方式 | Contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Scanlines Effect -->
  <div class="scanlines"></div>
  
  <!-- Header & Navigation -->
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">► PIXEL.GAME</a>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="about.html">简介</a>
        <a href="projects.html">作品</a>
        <a href="experience.html">经历</a>
        <a href="contact.html" class="active">联系</a>
      </nav>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <h1 class="page-title">联系方式</h1>
      
      <!-- Intro Card -->
      <div class="card fade-in" style="text-align: center; margin-bottom: 40px;">
        <h3 class="card-title" style="justify-content: center;">联系我</h3>
        <p style="font-size: 22px; color: var(--color-text); line-height: 1.8;">
          如果你有任何问题或合作意向，<br>
          欢迎通过邮件联系我！
        </p>
      </div>
      
      <!-- Contact Grid -->
      <div class="contact-grid">
        
        <!-- Email -->
        <div class="contact-card fade-in">
          <span class="contact-icon">📧</span>
          <span class="contact-label">电子邮件</span>
          <span class="contact-value">
            <a href="mailto:zxy3027765273@163.com">zxy3027765273@163.com</a>
          </span>
        </div>
        
        <!-- Location -->
        <div class="contact-card fade-in fade-in-delay-1">
          <span class="contact-icon">📍</span>
          <span class="contact-label">所在位置</span>
          <span class="contact-value">北京，中国</span>
        </div>
        
      </div>
      
      <!-- Quote -->
      <div class="card fade-in" style="margin-top: 40px; background: linear-gradient(135deg, var(--color-card) 0%, var(--color-bg-secondary) 100%);">
        <div style="text-align: center; padding: 20px;">
          <p style="font-family: var(--font-pixel); font-size: 14px; color: var(--color-secondary); margin-bottom: 15px;">
            "期待与你的交流"
          </p>
        </div>
      </div>
      
    </div>
  </main>
  
  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">
        © 2024 <span>►</span> 宫宁 <span>|</span> 
        用❤打造的像素世界 | <a href="https://github.com" target="_blank">GitHub</a>
      </p>
    </div>
  </footer>
  
  <script src="js/main.js"></script>
</body>
</html>
