<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素世界 | Pixel Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Scanlines Effect -->
  <div class="scanlines"></div>
  
  <!-- Header & Navigation -->
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">► PIXEL.GAME</a>
      <nav class="nav">
        <a href="index.html" class="active">首页</a>
        <a href="about.html">简介</a>
        <a href="projects.html">作品</a>
        <a href="experience.html">经历</a>
        <a href="contact.html">联系</a>
      </nav>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <!-- Hero Section -->
      <section class="hero">
        <h1 class="hero-title">欢迎来到像素世界</h1>
        <p class="hero-subtitle">我是宫宁</p>
        <p class="hero-desc">
          一名运维工程师。<br>
          专注于系统运维、自动化部署与监控告警。
        </p>
        <div class="hero-buttons">
          <a href="about.html" class="btn btn-primary">了解我</a>
          <a href="projects.html" class="btn btn-secondary">查看作品</a>
        </div>
      </section>
      
      <!-- Quick Stats -->
      <div class="card fade-in fade-in-delay-1">
        <h3 class="card-title">技术能力</h3>
        <div class="skills-grid">
          <span class="skill-tag">Linux运维</span>
          <span class="skill-tag">Docker</span>
          <span class="skill-tag">Kubernetes</span>
          <span class="skill-tag">MySQL</span>
          <span class="skill-tag">Nginx</span>
          <span class="skill-tag">监控告警</span>
          <span class="skill-tag">Shell脚本</span>
          <span class="skill-tag">公有云</span>
        </div>
      </div>
    </div>
  </main>
  
  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">
        © 2024 <span>►</span> 宫宁 <span>|</span> 
        用❤打造的像素世界 | <a href="https://github.com" target="_blank">GitHub</a>
      </p>
    </div>
  </footer>
  
  <script src="js/main.js"></script>
